<!DOCTYPE html>
<html>
<head>
    <title>Anime Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #1c1c1c; color: white; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 10px; border: none; background: #5288c1; color: white; }
    </style>
</head>
<body>
    <h1>Anime Market</h1>
    <p>Welcome to the Market!</p>
    <button onclick="sendData()">Get Daily Reward</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function sendData() {
            tg.sendData(JSON.stringify({"type": "daily"}));
            alert("Daily reward request sent!");
        }
    </script>
</body>
</html>
